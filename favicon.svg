<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#7B35A8"/>
      <stop offset="30%"  stop-color="#4468C0"/>
      <stop offset="58%"  stop-color="#2898B8"/>
      <stop offset="82%"  stop-color="#28A890"/>
      <stop offset="100%" stop-color="#266830"/>
    </linearGradient>
  </defs>

  <!-- Tier 1 – top, smallest -->
  <ellipse cx="46" cy="16" rx="5"  ry="11" fill="url(#cg)" transform="rotate(-16 46 16)"/>
  <ellipse cx="54" cy="16" rx="5"  ry="11" fill="url(#cg)" transform="rotate(16 54 16)"/>

  <!-- Tier 2 -->
  <ellipse cx="43" cy="30" rx="7"  ry="14" fill="url(#cg)" transform="rotate(-18 43 30)"/>
  <ellipse cx="57" cy="30" rx="7"  ry="14" fill="url(#cg)" transform="rotate(18 57 30)"/>

  <!-- Tier 3 -->
  <ellipse cx="40" cy="45" rx="9"  ry="15" fill="url(#cg)" transform="rotate(-20 40 45)"/>
  <ellipse cx="60" cy="45" rx="9"  ry="15" fill="url(#cg)" transform="rotate(20 60 45)"/>

  <!-- Tier 4 – widest -->
  <ellipse cx="37" cy="60" rx="11" ry="15" fill="url(#cg)" transform="rotate(-20 37 60)"/>
  <ellipse cx="63" cy="60" rx="11" ry="15" fill="url(#cg)" transform="rotate(20 63 60)"/>

  <!-- Tier 5 – base leaves -->
  <ellipse cx="38" cy="73" rx="10" ry="13" fill="url(#cg)" transform="rotate(-16 38 73)"/>
  <ellipse cx="62" cy="73" rx="10" ry="13" fill="url(#cg)" transform="rotate(16 62 73)"/>

  <!-- Trunk -->
  <rect x="46" y="78" width="8" height="16" rx="4" fill="#1E6020"/>
</svg>
